<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiały Budowlane</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="logo">Bud-Max</div>
        <ul class="nav-links">
            <li><a href="#oferta">Oferta</a></li>
            <li><a href="#kontakt">Kontakt</a></li>
        </ul>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>
    <header id="hero">
        <h1>Solidne Materiały</h1>
        <a href="#kontakt" class="btn">Kontakt</a>
    </header>
    <section id="oferta">
        <div class="cards">

            <a href="cegly-i-bloczki.html" class="card link-card">
                <h3>Cegły i Bloczki</h3>
                <div class="img-area">
                    <img src="source/folie.jpg" alt="cegły i bloczki">
                </div>
                <div class="card-action">
                    <span class="material-symbols-outlined">arrow_forward</span>
                </div>
            </a>

            <a href="chemia-budowlana.html" class="card link-card">
                <h3>Chemia Budowlana</h3>
                <div class="img-area">
                    <img src="source/chemia.jpg" alt="">
                </div>
                <div class="card-action">
                    <span class="material-symbols-outlined">arrow_forward</span>
                </div>
            </a>

            <a href="materialy-izolacyjne.html" class="card link-card">
                <h3>Materiały Izolacyjne</h3>
                <div class="img-area">
                    <img src="source/izolator.jpg" alt="">
                </div>
                    <div class="card-action">
                    <span class="material-symbols-outlined">arrow_forward</span>
                    </div>          
                </a>
        </div>
    </section>
    <section id="kontakt">
        <h2><span class="material-symbols-outlined">mail</span> Kontakt</h2>
        <div class="contact-container">
            <form class="contact-form">
                <input type="text" placeholder="Imię i nazwisko" required>
                <input type="email" placeholder="Adres e-mail" required>
                <textarea placeholder="Twoja wiadomość" rows="5" required></textarea>
                <button type="submit" class="btn"><span class="material-symbols-outlined">send</span> Wyślij</button>
            </form>
            <div id="map"></div>
        </div>
    </section>
    <footer>
        <p><span class="material-symbols-outlined">call</span> 123 456 789 | <span
                class="material-symbols-outlined">email</span> biuro@bud-max.pl</p>
        <p><span class="material-symbols-outlined">location_on</span> ul. Węgierska 1, 33-300 Nowy Sącz</p>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
